#
#################################################################################
set_rp_filter = yes


#################################################################################
#
# set ssh permit empty passwd
# ---------------
# set_ssh_permitemptypasswd=yes|no
#
#################################################################################
set_ssh_permitemptypasswd = no


#################################################################################
